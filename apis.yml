aid: zora
url: https://raw.githubusercontent.com/api-evangelist/zora/refs/heads/main/apis.yml
name: Zora
kind: company
description: Zora is an NFT protocol and marketplace that enables creators to mint,
  sell, and manage digital collectibles across Ethereum mainnet and Layer 2 networks
  including the Zora Network (an OP Stack L2), Base, and Optimism. The platform exposes
  a GraphQL NFT API for querying collections, token metadata, mint events, on-chain
  sales, and creator royalty data; a Coins SDK REST API for exploring and trading
  Zora Coins (creator monetization tokens); and a Protocol SDK for contract-level
  interactions covering ERC-721 and ERC-1155 minting workflows. API keys are available
  via Zora Developer Settings to unlock higher rate limits beyond the public unauthenticated
  threshold.
