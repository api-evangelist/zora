apis:
- aid: zora:nft-api
  name: Zora NFT GraphQL API
  description: GraphQL API for querying NFT metadata, on-chain sales, mint events,
    collection attributes, and market statistics across Ethereum mainnet and supported
    L2 networks. Provides aggregateAttributes, aggregateStat, collections, events,
    mints, sales, search, and tokens operations. Unauthenticated access is permitted
    up to 120 requests per minute; an API key via the X-API-KEY header removes that
    cap.
  humanURL: https://github.com/ourzora/zora-docs/blob/main/docs/zora-api/intro.mdx
  baseURL: https://api.zora.co/graphql
  tags:
  - NFT
  - GraphQL
  - Collections
  - Sales
  - Mints
  - Tokens
  - Metadata
  - ERC-721
  properties:
  - type: Documentation
    url: https://github.com/ourzora/zora-docs/blob/main/docs/zora-api/intro.mdx
  - type: Authentication
    url: https://keys.api.zora.co/
  - url: graphql/zora-graphql.md
    type: GraphQL
- aid: zora:coins-rest-api
  name: Zora Coins SDK REST API
  description: Language-agnostic REST API for querying Zora Coins — creator monetization
    tokens that trade on the Zora protocol. Endpoints cover coin metadata and market
    data, user/wallet profile holdings and activity, and explore discovery lists (new,
    trending, top gainers). Interactive OpenAPI documentation and code examples in
    Python, Go, and Ruby are available at the api-sdk.zora.engineering/docs portal.
  humanURL: https://docs.zora.co/coins/sdk/public-rest-api
  baseURL: https://api-sdk.zora.engineering/api
  tags:
  - Coins
  - REST
  - Market Data
  - Profile
  - Discovery
  properties:
  - type: Documentation
    url: https://docs.zora.co/coins/sdk/public-rest-api
  - type: OpenAPI
    url: https://api-sdk.zora.engineering/docs
  - type: OpenAPI
    url: openapi/zora-coins-rest-api-openapi.json
- aid: zora:protocol-sdk
  name: Zora Protocol SDK
  description: TypeScript SDK providing a Creator Client for deploying and managing
    Zora ERC-1155 and ERC-721 contracts and a Collector Client for minting tokens
    (both on-chain and gasless premint flows). Supports getTokensOfContract to enumerate
    all on-chain and premint tokens for a given 1155 contract across supported networks
    including Zora Network, Ethereum, Base, and Optimism.
  humanURL: https://nft-docs.zora.co/protocol-sdk/introduction
  baseURL: https://zora.co
  tags:
  - Protocol SDK
  - ERC-1155
  - ERC-721
  - Minting
  - Creator Tools
  - Collector
  - TypeScript
  properties:
  - type: Documentation
    url: https://nft-docs.zora.co/protocol-sdk/introduction
  - type: GitHub
    url: https://github.com/ourzora/zora-protocol
- aid: zora:network-rpc
  name: Zora Network RPC API
  description: JSON-RPC access to the Zora Network L2 chain (Chain ID 7777777), an
    OP Stack rollup on Ethereum. Compatible with standard Ethereum JSON-RPC tooling
    (viem, ethers.js, web3.js). A public RPC endpoint is available at https://rpc.zora.energy;
    higher-throughput access is offered through third-party node providers including
    Conduit, QuickNode, Alchemy, and GetBlock.
  humanURL: https://docs.zora.co/zora-network/api-access
  baseURL: https://rpc.zora.energy
  tags:
  - RPC
  - JSON-RPC
  - L2
  - Zora Network
  - Ethereum
  - OP Stack
  properties:
  - type: Documentation
    url: https://docs.zora.co/zora-network/api-access
